name: Book Management CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests (SQLite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Server/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create database and tables
        env:
          BOOKS_DB_PATH: data/books.db
        run: |
          python -c "
          import sqlite3
          import os
          db_path = os.getenv('BOOKS_DB_PATH', 'data/books.db')
          os.makedirs(os.path.dirname(db_path), exist_ok=True)
          conn = sqlite3.connect(db_path)
          conn.execute('''
            CREATE TABLE IF NOT EXISTS book (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              publisher TEXT NOT NULL,
              name TEXT NOT NULL,
              date TEXT NOT NULL,
              cost REAL NOT NULL
            )
          ''')
          conn.execute('''
            CREATE TABLE IF NOT EXISTS user (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              username TEXT UNIQUE NOT NULL,
              password TEXT NOT NULL
            )
          ''')
          conn.commit()
          conn.close()
          "

      - name: Seed test user (for JWT)
        env:
          BOOKS_DB_PATH: data/books.db
        run: |
          python -c "
          import sqlite3
          import os
          from werkzeug.security import generate_password_hash
          db_path = os.getenv('BOOKS_DB_PATH', 'data/books.db')
          conn = sqlite3.connect(db_path)
          hashed = generate_password_hash('Test@1234')
          conn.execute('INSERT OR IGNORE INTO user (username, password) VALUES (?, ?)', ('testuser', hashed))
          conn.commit()
          conn.close()
          "

      - name: Run Pytest
        env:
          BOOKS_DB_PATH: data/books.db
          JWT_SECRET_KEY: "test-secret-key-32-chars-long-for-ci"
          MSSQL_SERVER: ""
        run: python -m pytest tests/pytest -v --json-report --json-report-file=tests/pytest/pytest-report.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-report
          path: Server/tests/pytest/pytest-report.json

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Client/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: react-dist
          path: Client/dist

    playwright-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Server/requirements.txt

      - name: Install backend dependencies
        working-directory: Server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create DB with schema and sample data
        working-directory: Server
        env:
          BOOKS_DB_PATH: data/books.db
        run: |
          python -c "
          import sqlite3, os
          db_path = os.getenv('BOOKS_DB_PATH', 'data/books.db')
          os.makedirs(os.path.dirname(db_path), exist_ok=True)
          conn = sqlite3.connect(db_path)
          conn.execute('CREATE TABLE IF NOT EXISTS book (id INTEGER PRIMARY KEY AUTOINCREMENT, publisher TEXT NOT NULL, name TEXT NOT NULL, date TEXT NOT NULL, cost REAL NOT NULL)')
          conn.execute('CREATE TABLE IF NOT EXISTS user (id INTEGER PRIMARY KEY AUTOINCREMENT, username TEXT UNIQUE NOT NULL, password TEXT NOT NULL)')
          conn.execute('INSERT OR IGNORE INTO book (publisher, name, date, cost) VALUES (?, ?, ?, ?)', ('CI Pub', 'CI Book', '2026-06-01', 99.99))
          from werkzeug.security import generate_password_hash
          hashed = generate_password_hash('Test@1234')
          conn.execute('INSERT OR IGNORE INTO user (username, password) VALUES (?, ?)', ('testuser', hashed))
          conn.commit()
          conn.close()
          print('Database initialized with test user and book')
          "

      - name: Verify database and user
        working-directory: Server
        run: |
          python -c "
          import sqlite3, os
          db_path = os.getenv('BOOKS_DB_PATH', 'data/books.db')
          conn = sqlite3.connect(db_path)
          cursor = conn.cursor()
          cursor.execute('SELECT * FROM user')
          user = cursor.fetchone()
          print(f'User in DB: {user}')
          cursor.execute('SELECT * FROM book')
          book = cursor.fetchone()
          print(f'Book in DB: {book}')
          conn.close()
          "

      - name: Start Flask backend (SQLite) with debug logging
        working-directory: Server
        env:
          BOOKS_DB_PATH: data/books.db
          JWT_SECRET_KEY: "test-secret-key-32-chars-long-for-ci"
          FLASK_APP: app.py
          FLASK_ENV: development
          FLASK_DEBUG: 1
        run: flask run --host 127.0.0.1 --port 5001 &

      - name: Wait for backend
        run: |
          for i in {1..30}; do curl -fsS http://127.0.0.1:5001/health && exit 0; sleep 2; done; exit 1

      - name: Test login manually (debug)
        run: |
          curl -X POST http://127.0.0.1:5001/login -H "Content-Type: application/json" -d '{"username":"testuser","password":"Test@1234"}' || echo "Login failed, see backend logs"

      - uses: actions/download-artifact@v4
        with:
          name: react-dist
          path: Client/dist

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Client/package-lock.json

      - name: Install frontend dependencies and serve build
        working-directory: Client
        run: |
          npm ci
          npx serve -s dist -l 5173 &

      - name: Wait for frontend
        run: |
          for i in {1..30}; do curl -fsS http://127.0.0.1:5173 && exit 0; sleep 2; done; exit 1

      - name: Write global-setup.js (with debug prints)
        working-directory: Client
        run: |
          cat > global-setup.js << 'EOF'
          import { chromium } from '@playwright/test';

          async function globalSetup() {
            const browser = await chromium.launch();
            const page = await browser.newPage();

            const backendUrl = 'http://localhost:5001';
            console.log('Checking backend health...');
            const health = await page.request.get(`${backendUrl}/health`);
            if (!health.ok()) throw new Error(`Backend health check failed: ${health.status()}`);
            console.log('Backend is healthy');

            console.log('Attempting login...');
            const loginRes = await page.request.post(`${backendUrl}/login`, {
              data: { username: 'testuser', password: 'Test@1234' }
            });
            if (!loginRes.ok()) {
              const text = await loginRes.text();
              console.error('Login response body:', text);
              throw new Error(`Login failed: ${loginRes.status()} ${text}`);
            }
            const { access_token } = await loginRes.json();
            console.log('Login successful, token obtained');

            await page.addInitScript((token) => {
              window.localStorage.setItem('access_token', token);
            }, access_token);

            await page.context().storageState({ path: 'auth-state.json' });
            await browser.close();
            console.log('Global setup complete');
          }

          export default globalSetup;
          EOF

      - name: Write playwright.config.js
        working-directory: Client
        run: |
          cat > playwright.config.js << 'EOF'
          import { defineConfig, devices } from '@playwright/test';

          export default defineConfig({
            testDir: './tests',
            fullyParallel: true,
            forbidOnly: !!process.env.CI,
            retries: process.env.CI ? 2 : 0,
            workers: process.env.CI ? 1 : undefined,
            reporter: 'html',
            timeout: 60000,
            globalSetup: './global-setup.js',
            use: {
              baseURL: process.env.BASE_URL || 'http://localhost:5173',
              trace: 'on-first-retry',
              screenshot: 'only-on-failure',
              video: 'retain-on-failure',
              actionTimeout: 10000,
              navigationTimeout: 30000,
            },
            projects: [
              {
                name: 'chromium',
                use: { ...devices['Desktop Chrome'] },
              },
            ],
          });
          EOF

      - name: Install Playwright browsers
        working-directory: Client
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: Client
        env:
          BASE_URL: http://localhost:5173
        run: npx playwright test --workers=1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: Client/playwright-report

  package-artifacts:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, playwright-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: react-dist
          path: release/react-dist
      - uses: actions/upload-artifact@v4
        with:
          name: book-management-release
          path: release