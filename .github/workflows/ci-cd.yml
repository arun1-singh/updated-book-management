name: Book Management CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

# ---------------------------------------------------------------------------
# Shared environment — all jobs inherit these
# ---------------------------------------------------------------------------
env:
  MSSQL_SERVER: "127.0.0.1,1433"
  MSSQL_DATABASE: books_db
  MSSQL_USERNAME: sa
  MSSQL_PASSWORD: "YourStrong@Passw0rd"
  MSSQL_DRIVER: "ODBC Driver 17 for SQL Server"
  MSSQL_TRUST_CERT: "yes"
  JWT_SECRET_KEY: "ci-test-secret-key-32-chars-long!"

# ---------------------------------------------------------------------------
jobs:
# ---------------------------------------------------------------------------

  backend-tests:
    name: Backend Tests (MSSQL)
    runs-on: ubuntu-latest

    # ── SQL Server container ─────────────────────────────────────────────
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2019-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "YourStrong@Passw0rd"
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/localhost/1433'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 20s

    defaults:
      run:
        working-directory: Server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Server/requirements.txt

      # ── Install ODBC Driver 17 ───────────────────────────────────────
      - name: Install Microsoft ODBC Driver 17 for SQL Server
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] \
            https://packages.microsoft.com/ubuntu/22.04/prod jammy main" \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -q
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql17 unixodbc-dev
          odbcinst -q -d | grep -q "ODBC Driver 17" && echo "Driver installed OK"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Create database + schema ─────────────────────────────────────
      - name: Create database and schema
        run: |
          python - <<'PYEOF'
          import pyodbc, os, time

          server   = os.environ['MSSQL_SERVER']
          password = os.environ['MSSQL_PASSWORD']

          # Connect to master to create the DB
          master_cs = (
              f"DRIVER={{ODBC Driver 17 for SQL Server}};"
              f"SERVER={server};DATABASE=master;UID=sa;PWD={password};"
              "TrustServerCertificate=yes;"
          )
          for attempt in range(10):
              try:
                  conn = pyodbc.connect(master_cs, timeout=5)
                  break
              except pyodbc.Error as e:
                  print(f"Attempt {attempt+1}/10 failed: {e}. Retrying in 5s...")
                  time.sleep(5)
          else:
              raise RuntimeError("Could not connect to SQL Server after 10 attempts")

          conn.autocommit = True
          cursor = conn.cursor()
          cursor.execute("""
              IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'books_db')
              CREATE DATABASE books_db
          """)
          cursor.close()
          conn.close()

          # Connect to books_db and create tables
          db_cs = (
              f"DRIVER={{ODBC Driver 17 for SQL Server}};"
              f"SERVER={server};DATABASE=books_db;UID=sa;PWD={password};"
              "TrustServerCertificate=yes;"
          )
          conn = pyodbc.connect(db_cs)
          cursor = conn.cursor()
          cursor.execute("""
              IF NOT EXISTS (SELECT * FROM sysobjects WHERE name='book' AND xtype='U')
              CREATE TABLE book (
                  id        INT IDENTITY(1,1) PRIMARY KEY,
                  publisher NVARCHAR(255) NOT NULL,
                  name      NVARCHAR(255) NOT NULL,
                  date      NVARCHAR(20)  NOT NULL,
                  cost      FLOAT         NOT NULL
              )
          """)
          cursor.execute("""
              IF NOT EXISTS (SELECT * FROM sysobjects WHERE name='users' AND xtype='U')
              CREATE TABLE users (
                  id            INT IDENTITY(1,1) PRIMARY KEY,
                  username      NVARCHAR(150) NOT NULL UNIQUE,
                  password_hash NVARCHAR(256) NOT NULL
              )
          """)
          conn.commit()
          cursor.close()
          conn.close()
          print("Database and tables created OK")
          PYEOF

      # ── Seed test user ───────────────────────────────────────────────
      - name: Seed test user
        run: |
          python - <<'PYEOF'
          import pyodbc, os
          from werkzeug.security import generate_password_hash

          cs = (
              f"DRIVER={{ODBC Driver 17 for SQL Server}};"
              f"SERVER={os.environ['MSSQL_SERVER']};DATABASE=books_db;"
              f"UID=sa;PWD={os.environ['MSSQL_PASSWORD']};TrustServerCertificate=yes;"
          )
          conn = pyodbc.connect(cs)
          cursor = conn.cursor()
          cursor.execute("SELECT id FROM users WHERE username = 'testuser'")
          if not cursor.fetchone():
              hashed = generate_password_hash('Test@1234')
              cursor.execute(
                  "INSERT INTO users (username, password_hash) VALUES (?, ?)",
                  ('testuser', hashed)
              )
              conn.commit()
              print("testuser seeded OK")
          else:
              print("testuser already exists")
          cursor.close()
          conn.close()
          PYEOF

      - name: Run Pytest
        run: |
          python -m pytest tests/pytest -v \
            --json-report --json-report-file=tests/pytest/pytest-report.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-report
          path: Server/tests/pytest/pytest-report.json

# ---------------------------------------------------------------------------

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Client/package-lock.json

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: react-dist
          path: Client/dist

# ---------------------------------------------------------------------------

  playwright-tests:
    name: Playwright E2E Tests (MSSQL)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    # ── SQL Server container ─────────────────────────────────────────────
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2019-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "YourStrong@Passw0rd"
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/localhost/1433'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 20s

    steps:
      - uses: actions/checkout@v4

      # ── Python / Flask ────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Server/requirements.txt

      - name: Install Microsoft ODBC Driver 17 for SQL Server
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] \
            https://packages.microsoft.com/ubuntu/22.04/prod jammy main" \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -q
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql17 unixodbc-dev
          odbcinst -q -d | grep -q "ODBC Driver 17" && echo "Driver installed OK"

      - name: Install backend dependencies
        working-directory: Server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Create DB + schema + seed data ──────────────────────────────
      - name: Create database, schema and seed test data
        working-directory: Server
        run: |
          python - <<'PYEOF'
          import pyodbc, os, time
          from werkzeug.security import generate_password_hash

          server   = os.environ['MSSQL_SERVER']
          password = os.environ['MSSQL_PASSWORD']

          master_cs = (
              f"DRIVER={{ODBC Driver 17 for SQL Server}};"
              f"SERVER={server};DATABASE=master;UID=sa;PWD={password};"
              "TrustServerCertificate=yes;"
          )
          for attempt in range(10):
              try:
                  conn = pyodbc.connect(master_cs, timeout=5)
                  break
              except pyodbc.Error as e:
                  print(f"Attempt {attempt+1}/10: {e}. Retrying in 5s...")
                  time.sleep(5)
          else:
              raise RuntimeError("Could not connect to SQL Server after 10 attempts")

          conn.autocommit = True
          cursor = conn.cursor()
          cursor.execute("""
              IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'books_db')
              CREATE DATABASE books_db
          """)
          cursor.close()
          conn.close()

          db_cs = (
              f"DRIVER={{ODBC Driver 17 for SQL Server}};"
              f"SERVER={server};DATABASE=books_db;UID=sa;PWD={password};"
              "TrustServerCertificate=yes;"
          )
          conn = pyodbc.connect(db_cs)
          cursor = conn.cursor()
          cursor.execute("""
              IF NOT EXISTS (SELECT * FROM sysobjects WHERE name='book' AND xtype='U')
              CREATE TABLE book (
                  id        INT IDENTITY(1,1) PRIMARY KEY,
                  publisher NVARCHAR(255) NOT NULL,
                  name      NVARCHAR(255) NOT NULL,
                  date      NVARCHAR(20)  NOT NULL,
                  cost      FLOAT         NOT NULL
              )
          """)
          cursor.execute("""
              IF NOT EXISTS (SELECT * FROM sysobjects WHERE name='users' AND xtype='U')
              CREATE TABLE users (
                  id            INT IDENTITY(1,1) PRIMARY KEY,
                  username      NVARCHAR(150) NOT NULL UNIQUE,
                  password_hash NVARCHAR(256) NOT NULL
              )
          """)
          conn.commit()

          # Seed testuser
          cursor.execute("SELECT id FROM users WHERE username = 'testuser'")
          if not cursor.fetchone():
              hashed = generate_password_hash('Test@1234')
              cursor.execute(
                  "INSERT INTO users (username, password_hash) VALUES (?, ?)",
                  ('testuser', hashed)
              )

          # Seed a sample book
          cursor.execute("SELECT id FROM book WHERE name = 'CI Book'")
          if not cursor.fetchone():
              cursor.execute(
                  "INSERT INTO book (publisher, name, date, cost) VALUES (?, ?, ?, ?)",
                  ('CI Publisher', 'CI Book', '2026-06-01', 99.99)
              )

          conn.commit()
          cursor.close()
          conn.close()
          print("Database seeded OK")
          PYEOF

      # ── Start Flask ──────────────────────────────────────────────────
      - name: Start Flask backend
        working-directory: Server
        env:
          FLASK_APP: app.py
          FLASK_ENV: development
        run: flask run --host 127.0.0.1 --port 5001 &

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:5001/health && echo "" && exit 0
            sleep 2
          done
          echo "Backend never became healthy" && exit 1

      - name: Smoke-test login against MSSQL
        run: |
          curl -sf -X POST http://127.0.0.1:5001/login \
            -H "Content-Type: application/json" \
            -d '{"username":"testuser","password":"Test@1234"}' \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'access_token' in d, f'No token in response: {d}'
          print('Login smoke-test passed')
          "

      # ── Frontend ─────────────────────────────────────────────────────
      - uses: actions/download-artifact@v4
        with:
          name: react-dist
          path: Client/dist

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Client/package-lock.json

      - name: Install frontend dependencies
        working-directory: Client
        run: npm ci

      - name: Serve built frontend
        working-directory: Client
        run: npx serve -s dist -l 5173 &

      - name: Wait for frontend to be ready
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:5173 && echo "" && exit 0
            sleep 2
          done
          echo "Frontend never became healthy" && exit 1

      # ── Playwright ───────────────────────────────────────────────────
      - name: Install Playwright browsers
        working-directory: Client
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: Client
        env:
          BASE_URL: http://localhost:5173
        run: npx playwright test --workers=1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: Client/playwright-report

# ---------------------------------------------------------------------------

  package-artifacts:
    name: Package Release Artifacts
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, playwright-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: react-dist
          path: release/react-dist

      - uses: actions/upload-artifact@v4
        with:
          name: book-management-release
          path: release
