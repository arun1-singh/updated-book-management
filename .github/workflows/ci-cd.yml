name: Book Management CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests (SQLite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Server/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize SQLite database
        env:
          # Force SQLite by leaving MSSQL_SERVER unset
          BOOKS_DB_PATH: data/books.db
          JWT_SECRET_KEY: "test-secret-key-32-chars-long-for-ci"
        run: python -c "from app import init_db; init_db()"

      - name: Seed test user (for JWT)
        env:
          BOOKS_DB_PATH: data/books.db
          JWT_SECRET_KEY: "test-secret-key-32-chars-long-for-ci"
        run: |
          python -c "
          from app import get_db_connection
          conn = get_db_connection()
          conn.execute('INSERT OR IGNORE INTO user (username, password) VALUES (?, ?)', ('testuser', 'pbkdf2:sha256:260000$...'))
          conn.commit()
          conn.close()
          "
          # Note: In a real test you'd use a proper password hash. For CI you can modify app.py to create a test user on init.
          # Simpler: just run the signup API via curl after starting the server, but that's later.
          # For now we'll handle it in Playwright's global-setup.

      - name: Run Pytest
        env:
          BOOKS_DB_PATH: data/books.db
          JWT_SECRET_KEY: "test-secret-key-32-chars-long-for-ci"
          MSSQL_SERVER: ""  # explicitly empty to avoid MSSQL
        run: python -m pytest tests/pytest -v --json-report --json-report-file=tests/pytest/pytest-report.json

      - name: Upload Pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: Server/tests/pytest/pytest-report.json

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Client/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-dist
          path: Client/dist

  playwright-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Server/requirements.txt

      - name: Install backend dependencies
        working-directory: Server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize SQLite database (with test data)
        working-directory: Server
        env:
          BOOKS_DB_PATH: data/books.db
          JWT_SECRET_KEY: "test-secret-key-32-chars-long-for-ci"
        run: |
          python -c "from app import init_db; init_db()"
          python -c "
          import sqlite3
          conn = sqlite3.connect('data/books.db')
          # Insert a sample book
          conn.execute('INSERT INTO book (publisher, name, date, cost) VALUES (?, ?, ?, ?)',
                       ('CI Publisher', 'CI Book', '2026-06-01', 99.99))
          conn.commit()
          conn.close()
          "

      - name: Start Flask backend (SQLite)
        working-directory: Server
        env:
          BOOKS_DB_PATH: data/books.db
          JWT_SECRET_KEY: "test-secret-key-32-chars-long-for-ci"
          FLASK_APP: app.py
          FLASK_ENV: production
          # No MSSQL variables
        run: flask run --host 127.0.0.1 --port 5001 &

      - name: Wait for backend to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5001/health; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready"
          exit 1

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: react-dist
          path: Client/dist

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Client/package-lock.json

      - name: Install frontend dependencies and serve build
        working-directory: Client
        run: |
          npm ci
          npx serve -s dist -l 5173 &

      - name: Wait for frontend to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5173; then
              echo "Frontend is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not become ready"
          exit 1

      - name: Install Playwright browsers
        working-directory: Client
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: Client
        env:
          BASE_URL: http://localhost:5173
        run: npx playwright test --workers=1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Client/playwright-report
          retention-days: 30

  package-artifacts:
    name: Package Release Artifacts
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build
      - playwright-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: react-dist
          path: release/react-dist

      - name: Upload final release package
        uses: actions/upload-artifact@v4
        with:
          name: book-management-release
          path: release
          retention-days: 30